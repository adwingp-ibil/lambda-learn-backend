version: 0.2

# AWS CodeBuild pipeline for lambda-learn-backend.
#
# Stages: install Node 20 + Terraform -> npm install -> npm test ->
#         terraform apply (creates the Lambda function, IAM role, CloudWatch
#         log group, the CodeBuild project, and the artifact bucket).
#
# TF_STATE_BUCKET must name an S3 bucket that ALREADY EXISTS (same region as
# this build) to hold Terraform state. Locking uses S3-native locking
# (use_lockfile), so no DynamoDB table is needed (requires Terraform >= 1.10).
#
# The CodeBuild service role must be able to manage this stack and the state
# bucket (see terraform/codebuild.tf).

env:
  variables:
    TERRAFORM_VERSION: "1.11.4"
    TF_STATE_BUCKET: "lambda-learn-tfstate-adwingp"
    TF_STATE_KEY: "lambda-learn/terraform.tfstate"

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo "Installing Terraform ${TERRAFORM_VERSION}..."
      - curl -sSLo /tmp/terraform.zip "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
      - unzip -o /tmp/terraform.zip -d /tmp
      - mv /tmp/terraform /usr/local/bin/terraform
      - terraform version

  pre_build:
    commands:
      - echo "Node version:" && node --version
      - echo "Installing dependencies..."
      - cd "$CODEBUILD_SRC_DIR/src" && npm install

  build:
    commands:
      - echo "Running unit tests..."
      - cd "$CODEBUILD_SRC_DIR/src" && npm test
      - echo "Deploying infrastructure with Terraform..."
      - cd "$CODEBUILD_SRC_DIR/terraform"
      - |
        terraform init -input=false \
          -backend-config="bucket=${TF_STATE_BUCKET}" \
          -backend-config="key=${TF_STATE_KEY}" \
          -backend-config="region=${AWS_DEFAULT_REGION}" \
          -backend-config="use_lockfile=true"
      - |
        # Adopt a pre-existing CloudWatch log group into Terraform state.
        # A /aws/lambda/<fn> log group can linger after a Lambda is deleted,
        # and Terraform would then fail trying to "create" it. Guarded so it
        # is a no-op when already tracked or absent.
        if ! terraform state list | grep -q '^aws_cloudwatch_log_group.lambda$'; then
          echo "Importing pre-existing log group /aws/lambda/lambda-learn-backend (if present)..."
          terraform import -input=false -var="aws_region=${AWS_DEFAULT_REGION}" \
            aws_cloudwatch_log_group.lambda /aws/lambda/lambda-learn-backend || true
        fi
      - terraform apply -input=false -auto-approve -var="aws_region=${AWS_DEFAULT_REGION}"
      - echo "Deploy complete. Outputs:"
      - terraform output

  post_build:
    commands:
      - echo "Build completed on $(date)"
