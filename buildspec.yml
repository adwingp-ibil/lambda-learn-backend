version: 0.2

# CodeBuild builds the Lambda deployment package and pushes it with
# `aws lambda update-function-code`. Infrastructure (the function, its role,
# this CodeBuild project, the artifact bucket) is managed by Terraform, not here.
#
# FUNCTION_NAME and ARTIFACT_BUCKET are set on the CodeBuild project by
# terraform/codebuild.tf.

phases:
  build:
    commands:
      - echo "Building deployment package..."
      - cd "$CODEBUILD_SRC_DIR/src"
      - npm install --omit=dev
      - zip -r "$CODEBUILD_SRC_DIR/lambda.zip" .

  post_build:
    commands:
      - cd "$CODEBUILD_SRC_DIR"
      - echo "Deploying to $FUNCTION_NAME..."
      - aws lambda update-function-code --function-name "$FUNCTION_NAME" --zip-file fileb://lambda.zip
      - |
        if [ -n "$ARTIFACT_BUCKET" ]; then
          aws s3 cp lambda.zip "s3://$ARTIFACT_BUCKET/lambda-$(date +%Y%m%d-%H%M%S)-$CODEBUILD_RESOLVED_SOURCE_VERSION.zip"
        fi

artifacts:
  files:
    - lambda.zip
