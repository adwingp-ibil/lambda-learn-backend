version: 0.2

# CodeBuild builds the Lambda dependencies and runs `terraform apply`, so
# Terraform is the single source of truth for both infrastructure and code.
#
# TF_STATE_BUCKET / TF_STATE_LOCK_TABLE are injected by the Terraform-managed
# CodeBuild project (terraform/codebuild.tf). This build only works on THAT
# project (or one where you set those vars) — see terraform/README.md.
# AWS_DEFAULT_REGION is provided automatically by CodeBuild.

env:
  variables:
    # Default so the download URL is never empty even if the project doesn't
    # set TF_VERSION. The Terraform-managed project sets the same value.
    TF_VERSION: "1.9.8"

phases:
  install:
    commands:
      - echo "Installing Terraform ${TF_VERSION}..."
      # -f makes curl fail (non-zero) on an HTTP error instead of saving the
      # error page as terraform.zip and confusing unzip later.
      - curl -fsSL -o /tmp/terraform.zip "https://releases.hashicorp.com/terraform/${TF_VERSION}/terraform_${TF_VERSION}_linux_amd64.zip"
      - unzip -o /tmp/terraform.zip -d /usr/local/bin/
      - terraform version

  pre_build:
    commands:
      - |
        if [ -z "$TF_STATE_BUCKET" ]; then
          echo "ERROR: TF_STATE_BUCKET is not set."
          echo "This build must run on the Terraform-managed CodeBuild project,"
          echo "which injects the state config. Run the local bootstrap + first"
          echo "'terraform apply' first (see terraform/README.md), then trigger"
          echo "builds on the '<project_name>-build' project it creates."
          exit 1
        fi
      - echo "Installing Lambda dependencies..."
      - cd "$CODEBUILD_SRC_DIR/src" && npm install --omit=dev

  build:
    commands:
      - cd "$CODEBUILD_SRC_DIR/terraform"
      - terraform init -input=false -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="dynamodb_table=${TF_STATE_LOCK_TABLE}" -backend-config="region=${AWS_DEFAULT_REGION}"
      - terraform apply -auto-approve -input=false -var="aws_region=${AWS_DEFAULT_REGION}" -var="state_bucket=${TF_STATE_BUCKET}" -var="state_lock_table=${TF_STATE_LOCK_TABLE}"

  post_build:
    commands:
      - echo "Archiving deployed artifact..."
      - cd "$CODEBUILD_SRC_DIR/terraform"
      - BUCKET=$(terraform output -raw artifacts_bucket)
      - aws s3 cp build/lambda.zip "s3://$BUCKET/lambda-$(date +%Y%m%d-%H%M%S)-$CODEBUILD_RESOLVED_SOURCE_VERSION.zip"
